<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="ToDoList_Page.css">
</head>

<body>
    <header>
        <a id='header' href="index.html">To Main Page!</a>
    </header>
    <div id='page-wrapper'>
        <div id="top-row">
            <div id="main-window-full">
                <div id='main-window-top'>
                    <div class='main-window-header'>
                        <h1>To-Do List</h1>
                        <div id='button-background3'>
                            <div class='button-all' id='minimize-button'></div>
                        </div>
                        <div id='button-background2'>
                            <div class='button-all' id='maximize-button'></div>
                        </div>
                        <div id='button-background'>
                            <div class='button-all' id='x-button'></div>
                        </div>
                    </div>
                </div>
                <div class="main-window-sides">
                    <div class='main-window-right-left' id='main-window-left'></div>
                    <div class='main-window-right-left' id='main-window-right'></div>
                </div>
                <div id="main-window-bottom"></div>
                <img id='main-image' src="public/todoListImage.png" alt="image">
            </div>
            <div class="win98-window-blurb">
                <div class="win98-titlebar">
                    <h2 class="win98-title">Description</h2>
                    <div class="win98-buttons">
                        <div class="win98-btn-bg">
                            <div class="win98-btn minimize-btn"></div>
                        </div>
                        <div class="win98-btn-bg">
                            <div class="win98-btn maximize-btn"></div>
                        </div>
                        <div class="win98-btn-bg">
                            <div class="win98-btn x-btn"></div>
                        </div>
                    </div>
                </div>
                <div class="win98-body">
                    <div id="blurb-and-link">
                        <div id="blurb">This is a simple list application. You can add tasks, edit them, and delete when complete. Might take a minute to load.</div>
                        <a id='hyperlink' target="_blank" href="https://taskmaster-uogu.onrender.com">
                            <button id="try-it-button">Try it out!</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="win98-window-tech">
            <div class="win98-titlebar">
                <h2 class="win98-title">Technologies Used</h2>
                <div class="win98-buttons">
                    <div class="win98-btn-bg">
                        <div class="win98-btn minimize-btn"></div>
                    </div>
                    <div class="win98-btn-bg">
                        <div class="win98-btn maximize-btn"></div>
                    </div>
                    <div class="win98-btn-bg">
                        <div class="win98-btn x-btn"></div>
                    </div>
                </div>
            </div>
            <div class="win98-body">
                <div id="tech-info">
                    <span id="tech-image-list">
                        <div class='tech-image-and-description'>
                            <img class="tech-image-master" src="public/Python.png" alt="python-logo">
                            <span class='tech-name'>Python</span>
                        </div>
                        <div class='tech-image-and-description'>
                            <img class="tech-image-master" src="public/Flask.svg" alt="flask-logo">
                            <span class='tech-name'>Flask</span>
                        </div>
                        <div class='tech-image-and-description'>
                            <img class="tech-image-master" src="public/sqlalchemy.png" alt="sqlalchemy-logo">
                            <span class='tech-name'>SQLAlchemy</span>
                        </div>
                        <div class='tech-image-and-description'>
                            <img class="tech-image-master" src="public/HTML5.png" alt="html-logo">
                            <span class='tech-name'>HTML5</span>
                        </div>
                        <div class='tech-image-and-description'>
                            <img class="tech-image-master" src="public/CSS3_logo.svg" alt="css-logo">
                            <span class='tech-name'>CSS3</span>
                        </div>
                    </span>
                </div>
            </div>
        </div>

        <div class="win98-window-other">
            <div class="win98-titlebar">
                <h2 class="win98-title">Other Projects</h2>
                <div class="win98-buttons">
                    <div class="win98-btn-bg">
                        <div class="win98-btn minimize-btn"></div>
                    </div>
                    <div class="win98-btn-bg">
                        <div class="win98-btn maximize-btn"></div>
                    </div>
                    <div class="win98-btn-bg">
                        <div class="win98-btn x-btn"></div>
                    </div>
                </div>
            </div>
            <div class="win98-body">
                <div id="other-projects-container">
                    <div id="other-projects-list">
                        <a class='button-link' href="digitalAquariumPage.html">
                            <button class="other-projects-image-container">
                                <img class="other-projects-image" src="public/digitalAquarium.png" alt="digitalAquarium png">
                                <span class="image-text">Digital Aquarium</span>
                            </button>
                        </a>
                        <a class='button-link' href="healthCareDashboardPage.html">
                            <button class="other-projects-image-container">
                                <img class="other-projects-image" src="public/healthCareDashboard.png" alt="health care dashboard png">
                                <span class="image-text">Health Care Dashboard</span>
                            </button>
                        </a>
                        <a class='button-link' href="travelJournalPage.html">
                            <button class="other-projects-image-container">
                                <img class="other-projects-image" src="public/travelJournal.png" alt="travel journal png">
                                <span class="image-text">Travel Journal</span>
                            </button>
                        </a>
                        <a class='button-link' href="weatherAppPage.html">
                            <button class="other-projects-image-container">
                                <img class="other-projects-image" src="public/weatherApp.png" alt="weather app png">
                                <span class="image-text">Weather App</span>
                            </button>
                        </a>
                        <a class='button-link' href="movieAppPage.html">
                            <button class="other-projects-image-container">
                                <img class="other-projects-image" src="public/movieApp.png" alt="movie app png">
                                <span class="image-text">Movie App</span>
                            </button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer id="footer">Copyright © 2026 Steven Wright</footer>
</body>

</html>
